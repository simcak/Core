input {
  beats {
    port => 5044
  }
}

filter {
  if [message] =~ /GET \/health/ {
    drop{}
  }
  if [container][name] {
    mutate {
      replace => {"service.name" => "%{[container][name]}" }
    }
  }
  # If the log line looks like JSON (FastAPI structured logs), parse it
  if [message] =~ /^\s*\{/ {
    json {
      source => "message"
      target => "structured"
      skip_on_invalid_json => true
    }
  }

  # Extract log level from uvicorn access log lines:
  # INFO:     127.0.0.1:12345 - "GET /api/books HTTP/1.1" 200 OK
  if [message] =~ /^(INFO|WARNING|ERROR|DEBUG|CRITICAL):/ {
    grok {
      match => { "message" => "%{LOGLEVEL:log.level}:\s+%{GREEDYDATA:log.body}" }
      overwrite => ["log.level"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "transcendence-logs-%{+YYYY.MM.dd}"
    ilm_enabled => false
  }
}
